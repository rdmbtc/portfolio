<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Main gradient background circle -->
  <circle cx="16" cy="16" r="14" fill="url(#glow)" filter="url(#shadow)" />
  <!-- Dark core matching glassmorphism theme -->
  <circle cx="16" cy="16" r="8" fill="#030712" fill-opacity="0.9" stroke="#ffffff" stroke-width="0.75" stroke-opacity="0.1" />
  <!-- Emerald pulsing core indicator -->
  <circle cx="16" cy="16" r="3" fill="#10b981" />
  <circle cx="16" cy="16" r="4.5" stroke="#10b981" stroke-width="0.75" stroke-opacity="0.4" />
</svg>
